[project]
name = "parsimony"
version = "0.1.0a1"
description = "Connector framework for financial data — search, fetch, and catalog series from FRED, SDMX, FMP, SEC Edgar, and more"
authors = [{ name = "Ockham.sh", email = "team@ockham.sh" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["finance", "data", "connectors", "fred", "sdmx", "catalog"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.11.1,<3",
    "pandas>=2.3.0,<3",
    "pyarrow>=18.0.0",
    "httpx>=0.28.1",
    "platformdirs>=4.0.0,<5",
]

[project.optional-dependencies]
sdmx = ["sdmx1>=2.23.1,<3"]
embeddings = ["litellm>=1.59.0,<2"]
vec = ["sqlite-vec>=0.1.6"]
sec = ["edgartools>=4.0.0"]
financial-reports = ["financial-reports-generated-client>=1.4.30"]
mcp = ["mcp>=1.0.0", "tabulate>=0.9.0"]
all = ["parsimony[sdmx,embeddings,vec,sec,financial-reports,mcp]"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-requests>=2.31",
]
docs = ["mkdocs-material"]

[project.urls]
Homepage = "https://parsimony.dev"
Repository = "https://github.com/ockham-sh/parsimony"
Documentation = "https://docs.parsimony.dev"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "financial_reports_generated_client.*"
follow_imports = "skip"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
addopts = "--import-mode=importlib --cov=parsimony --cov-report=term-missing --cov-fail-under=80"
asyncio_mode = "auto"
pythonpath = ["."]
markers = [
    "integration: hits live APIs (may be slow, requires env vars)",
]

[tool.coverage.run]
omit = [
    "parsimony/connectors/alpha_vantage.py",
    "parsimony/connectors/bde.py",
    "parsimony/connectors/bdf.py",
    "parsimony/connectors/bdp.py",
    "parsimony/connectors/bls.py",
    "parsimony/connectors/boc.py",
    "parsimony/connectors/boj.py",
    "parsimony/connectors/coingecko.py",
    "parsimony/connectors/destatis.py",
    "parsimony/connectors/eia.py",
    "parsimony/connectors/eodhd.py",
    "parsimony/connectors/financial_reports.py",
    "parsimony/connectors/finnhub.py",
    "parsimony/connectors/fmp.py",
    "parsimony/connectors/fmp_screener.py",
    "parsimony/connectors/fred.py",
    "parsimony/connectors/polymarket.py",
    "parsimony/connectors/rba.py",
    "parsimony/connectors/riksbank.py",
    "parsimony/connectors/sdmx.py",
    "parsimony/connectors/sec_edgar.py",
    "parsimony/connectors/snb.py",
    "parsimony/connectors/tiingo.py",
    "parsimony/connectors/treasury.py",
    "parsimony/catalog/builder.py",
    "parsimony/mcp/__main__.py",
    "parsimony/embeddings/__init__.py",
    "parsimony/embeddings/litellm.py",
]
