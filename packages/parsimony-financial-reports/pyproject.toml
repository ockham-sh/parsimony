[project]
name = "parsimony-financial-reports"
version = "0.1.0a1"
description = "FinancialReports.eu connectors for parsimony — global filings (UK, EU, US, etc.) via the FinancialReports API."
authors = [{ name = "Ockham.sh", email = "team@ockham.sh" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["finance", "data", "connectors", "filings", "financial-reports", "parsimony"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Typing :: Typed",
]
dependencies = [
    "parsimony-core>=0.1.0a1",
    "financial-reports-generated-client>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "parsimony-plugin-tests>=0.1.0a1",
]

[project.urls]
Homepage = "https://parsimony.dev"
Repository = "https://github.com/ockham-sh/parsimony"

[project.entry-points."parsimony.providers"]
financial_reports = "parsimony_financial_reports:PROVIDER"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
parsimony-core = { workspace = true }
parsimony-plugin-tests = { workspace = true }

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -m 'not integration'"
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: hits live APIs (may be slow, requires env vars)",
]
