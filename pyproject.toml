[project]
name = "parsimony-monorepo"
version = "0.0.0"
description = "Workspace root for the parsimony monorepo. Not a published distribution."
requires-python = ">=3.11"

[tool.uv]
package = false

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "financial_reports_generated_client.*"
follow_imports = "skip"
