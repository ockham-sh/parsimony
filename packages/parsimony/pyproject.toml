[project]
# Distribution name on PyPI is `parsimony-core` because the bare `parsimony`
# name is squatted. The import path is unchanged: `from parsimony import ...`.
# A future shim package may reclaim the bare name.
name = "parsimony-core"
version = "0.1.0a1"
description = "Connector framework for financial data — typed fetch, hybrid-search catalogs, distribute via Hugging Face Hub or S3."
authors = [{ name = "Ockham.sh", email = "team@ockham.sh" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["finance", "data", "connectors", "fred", "sdmx", "catalog"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.11.1,<3",
    "pandas>=2.3.0,<3",
    "pyarrow>=23.0.1",
    "numpy>=1.26",
    "httpx>=0.28.1",
    "platformdirs>=4.0.0,<5",
]

# `standard` enables the canonical Catalog: Parquet+FAISS+BM25 with sentence-transformers
# embeddings and Hugging Face Hub distribution. Stays optional so `import parsimony`
# does not require torch. `litellm` adds the hosted-API embedder
# (LiteLLMEmbeddingProvider) for OpenAI / Gemini / Cohere / Voyage / Bedrock.
[project.optional-dependencies]
standard = [
    "faiss-cpu>=1.7",
    "rank-bm25>=0.2",
    "sentence-transformers>=3.0",
    "huggingface-hub>=0.28",
]
litellm = ["litellm>=1.50"]
s3 = ["s3fs>=2024.0"]
all = ["parsimony-core[standard,litellm,s3]"]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=5.0",
    "ruff>=0.15.10",
    "mypy>=1.10",
    "types-requests>=2.31",
]
docs = ["mkdocs-material"]

[project.urls]
Homepage = "https://parsimony.dev"
Repository = "https://github.com/ockham-sh/parsimony"
Documentation = "https://docs.parsimony.dev"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "financial_reports_generated_client.*"
follow_imports = "skip"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Distribution name (`parsimony-core`) intentionally differs from the import
# package (`parsimony`) — Hatch can't infer the package layout, so spell it out.
[tool.hatch.build.targets.wheel]
packages = ["parsimony"]

[tool.hatch.build.targets.sdist]
include = ["parsimony", "README.md", "pyproject.toml"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib --cov=parsimony --cov-report=term-missing --cov-fail-under=70 -m 'not integration'"
asyncio_mode = "auto"
pythonpath = ["."]
markers = [
    "integration: hits live APIs (may be slow, requires env vars)",
]

[tool.coverage.run]
omit = [
    "parsimony/connectors/alpha_vantage.py",
    "parsimony/connectors/bde.py",
    "parsimony/connectors/bdf.py",
    "parsimony/connectors/bdp.py",
    "parsimony/connectors/bls.py",
    "parsimony/connectors/boc.py",
    "parsimony/connectors/boj.py",
    "parsimony/connectors/coingecko.py",
    "parsimony/connectors/destatis.py",
    "parsimony/connectors/eia.py",
    "parsimony/connectors/eodhd.py",
    "parsimony/connectors/finnhub.py",
    "parsimony/connectors/fmp.py",
    "parsimony/connectors/fmp_screener.py",
    "parsimony/connectors/fred.py",
    "parsimony/connectors/polymarket.py",
    "parsimony/connectors/rba.py",
    "parsimony/connectors/riksbank.py",
    "parsimony/connectors/snb.py",
    "parsimony/connectors/tiingo.py",
    "parsimony/connectors/treasury.py",
    "parsimony/_standard/*",
]
