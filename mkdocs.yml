site_name: parsimony
site_url: https://docs.parsimony.dev
site_description: Typed, composable data connectors with searchable catalogs for Python
site_author: Ockham.sh
repo_url: https://github.com/ockham-sh/parsimony
repo_name: ockham-sh/parsimony
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Ubuntu
    code: Ubuntu Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/terminal.css

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: quickstart.md
      - User Guide: user-guide.md
  - Connectors: '!import https://github.com/ockham-sh/parsimony-connectors?branch=main&docs_dir=docs'
  - MCP Server: '!import https://github.com/ockham-sh/parsimony-mcp?branch=main&docs_dir=docs'
  - Guides:
      - Building Connectors: connector-implementation-guide.md
      - New Plugin Guide: guide-new-plugin.md
      - Private Connectors: building-a-private-connector.md
      - Internal Connectors: internal-connectors.md
      - MCP Setup: mcp-setup.md
      - Cookbook: cookbook.md
      - FAQ: faq.md
  - Reference:
      - Plugin Contract: contract.md
      - API Reference: api-reference.md
      - Architecture: architecture.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - multirepo

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ockham-sh/parsimony
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/parsimony/
