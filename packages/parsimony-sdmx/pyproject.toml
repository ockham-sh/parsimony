[project]
name = "parsimony-sdmx"
version = "0.1.0a1"
description = "SDMX connectors for parsimony — discover, fetch, and catalog series from ECB, Eurostat, IMF, World Bank, and other SDMX agencies"
authors = [{ name = "Ockham.sh", email = "team@ockham.sh" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["finance", "data", "connectors", "sdmx", "ecb", "eurostat", "imf", "parsimony"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "parsimony-core>=0.1.0a1",
    "sdmx1>=2.26.0,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "parsimony-plugin-tests>=0.1.0a1",
]
# Pulls in the standard catalog stack so examples/build_sdmx_catalog.py runs as-is.
examples = [
    "parsimony-core[standard]>=0.1.0a1",
]

[project.urls]
Homepage = "https://parsimony.dev"
Repository = "https://github.com/ockham-sh/parsimony"

# Plugin registration: discovered by parsimony.plugins.discover_providers().
[project.entry-points."parsimony.providers"]
sdmx = "parsimony_sdmx:PROVIDER"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
parsimony-core = { workspace = true }
parsimony-plugin-tests = { workspace = true }

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -m 'not integration'"
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: hits live APIs (may be slow, requires env vars)",
]
