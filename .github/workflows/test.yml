name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep the queue moving.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which packages changed; downstream test job uses this matrix.
  # Falls back to "everything" on main pushes so we don't accidentally skip
  # a package that depends transitively on a changed file outside packages/.
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] || [ -z "${{ github.base_ref }}" ]; then
            mapfile -t pkgs < <(ls -d packages/*/ | xargs -n1 basename)
          else
            base="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t pkgs < <(
              git diff --name-only "$base...HEAD" \
                | awk -F/ '$1=="packages" && $2 != "" {print $2}' \
                | sort -u
            )
            # Touching root config (workflows, root pyproject, Makefile) re-tests everything.
            if git diff --name-only "$base...HEAD" | grep -qE '^(\.github/|pyproject\.toml|Makefile|uv\.lock)'; then
              mapfile -t pkgs < <(ls -d packages/*/ | xargs -n1 basename)
            fi
          fi
          if [ "${#pkgs[@]}" -eq 0 ]; then
            echo 'packages=[]' >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${pkgs[@]}" | jq -R . | jq -sc .)
            echo "packages=$json" >> "$GITHUB_OUTPUT"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --all-packages
      - run: make lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --all-packages
      - run: make typecheck

  test:
    needs: changes
    if: needs.changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.changes.outputs.packages) }}
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras --all-packages
      - name: Test ${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: |
          if [ -d tests ]; then
            uv run --package ${{ matrix.package }} pytest --tb=short -q
          else
            echo "No tests/ directory in ${{ matrix.package }}; skipping"
          fi
